name: Upload Coverage to Teamscale

permissions:
  actions: read
  contents: read

# This is a separate workflow from pull_request.yml because it needs to run with access
# to the secrets
on:
  workflow_run:
    workflows: [Pull Request]
    types:
      - completed

jobs:
  upload_coverage:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: 'Add PR link and commit hash to summary'
        continue-on-error: true # temporary in case this breaks things
        env:
          PR: ${{ toJSON(github.event.workflow_run.pull_requests) }}
          PR_URL: ${{ github.event.workflow_run.pull_requests[0].html_url }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha }}
        run: |
          {
            echo "## Teamscale Coverage Upload"
            echo ""
            if [ -n "${PR_NUMBER}" ]; then
              echo "- Pull Request: [#${PR_NUMBER}](${PR_URL})"
            fi
            echo "- Commit: [\`${COMMIT_SHA}\`](${COMMIT_URL})"
          } >> "${GITHUB_STEP_SUMMARY}"
      # This checks out the latest commit on main, not teh PRs head
      # This is needed to get the teamscale-upload action
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 'Download artifact'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            let allArtifacts = await github.rest.actions.listWorkflowRunArtifacts({
               owner: context.repo.owner,
               repo: context.repo.repo,
               run_id: context.payload.workflow_run.id,
            });
            let matchArtifact = allArtifacts.data.artifacts.filter((artifact) => {
              return artifact.name == "coverage-report"
            })[0];
            let download = await github.rest.actions.downloadArtifact({
               owner: context.repo.owner,
               repo: context.repo.repo,
               artifact_id: matchArtifact.id,
               archive_format: 'zip',
            });
            const fs = require('fs');
            const path = require('path');
            const temp = '${{ runner.temp }}/artifacts';
            if (!fs.existsSync(temp)){
              fs.mkdirSync(temp);
            }
            fs.writeFileSync(path.join(temp, 'coverage-report.zip'), Buffer.from(download.data));

      - name: 'Unzip artifact'
        run: unzip "${RUNNER_TEMP}/artifacts/coverage-report.zip" -d "${RUNNER_TEMP}/artifacts"
      - name: 'Upload coverage'
        uses: ./actions/teamscale-upload
        with:
          partition: 'CI Tests'
          revision: ${{ github.event.workflow_run.head_sha }}
          files: "${{ runner.temp}}/artifacts/codeCoverageReport.xml"
          teamscaleKey: ${{ secrets.TEAMSCALE_ACCESS_KEY }}
