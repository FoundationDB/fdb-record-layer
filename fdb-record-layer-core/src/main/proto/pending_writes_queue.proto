syntax = "proto2";

package com.apple.foundationdb.record;

option java_outer_classname = "PendingWritesQueueProto";

/**
 * A pending write operation queued while an index is busy. Each item carries the
 * serialized "old" and "new" record bytes so the drainer can pass them to an
 * {@link com.apple.foundationdb.record.provider.foundationdb.IndexMaintainer}'s {@code update}
 * method. Either side may be absent: an INSERT has no {@code old_record}, a DELETE has no
 * {@code new_record}, and an UPDATE has both.
 */
message PendingWriteItem {
  // Schema version for the entry payload. Always written at the current value; readers reject
  // entries with a version newer than they understand.
  required int32 version = 1;
  // Serialized "old" record bytes. Absent on insert.
  optional bytes old_record = 2;
  // Serialized "new" record bytes. Absent on delete.
  optional bytes new_record = 3;
  // System.currentTimeMillis() at enqueue time, recorded for diagnostics and troubleshooting.
  required int64 enqueue_timestamp = 4;
}
