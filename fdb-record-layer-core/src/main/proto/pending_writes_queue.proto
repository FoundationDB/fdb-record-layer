syntax = "proto2";

package com.apple.foundationdb.record;

import "google/protobuf/any.proto";

option java_outer_classname = "PendingWritesQueueProto";

/**
 * A pending writes operation queued while an index is busy. The {@code payload} is an
 * {@code Any}-wrapped caller-supplied message; the queue is type-agnostic at the proto
 * layer, but each {@code PendingWritesQueue} instance is meant to store items of a certain type.
 */
message PendingWriteItem {
  // Leave the first few entries reserved for future use with a potential consolidation of this queue
  // with a previous implementation.
  reserved 1,2,3,4;
  // Schema version for the entry payload. Always written at the current value; readers reject
  // entries with a version newer than they understand.
  optional int32 version = 10;
  // The payload, packed inside an Any.
  // Entries whose stored type URL does not match are rejected on read.
  optional google.protobuf.Any payload = 11;
  // System.currentTimeMillis() at enqueue time, recorded for diagnostics and troubleshooting.
  optional int64 enqueue_timestamp = 12;
}
