syntax = "proto2";

package com.apple.foundationdb.record;
option java_outer_classname = "IndexBuildProto";

import "google/protobuf/any.proto";

// This stamp indicates an ongoing indexing process. It will be used to assure a coherent indexing
// continuation - which continued by another process.

message IndexBuildIndexingStamp {
  enum Method {
    INVALID      = 0;  // let zero be invalid
    BY_RECORDS   = 1;  // indexing by records - scanning all records in a record store
    BY_INDEX     = 2;  // indexing by a source index. When source index points to all possible records of the target index.
    SCRUB_REPAIR = 3;  // while readable, verify index validity. Repair if needed.
    MULTI_TARGET_BY_RECORDS = 4; // scan records, build multiple target indexes
    MUTUAL_BY_RECORDS = 5; // scan records, build multiple target indexes, while allowing multiple indexer processes
    NONE = 6; // return this stamp in query when null - never to be written in the DB
  };
  optional Method method = 1;
  optional bytes source_index_subspace_key = 2; // relevant only with BY_INDEX method
  optional int32 source_index_last_modified_version = 3; // only with BY_INDEX method
  repeated string targetIndex = 4; // (Only with MULTI_TARGET & MUTUAL) list of target indexes sorted alphabetically
                                   // the first item is used as the primary index
  optional bool block = 5; // if true and unexpired, indexing may not be continued
  optional uint64 blockExpireEpochMilliSeconds = 6; // if non zero, the block expiration time in milliseconds since epoch
  optional string blockID = 7; // optional, a short string that describes the reason for the block.
 }

// An heartbeat is maintained by an OnlineIndexer at every transaction during the indexing iteration, to ensure there
// aren't too many concurrent processes trying to build an index
message IndexBuildHeartbeat {
    optional string info = 1; // general information about the indexing session. This can be useful when querying the heartbeats.
    optional int64 createTimeMilliseconds = 2; // indexer's creation time (since epoch)
    optional int64 heartbeatTimeMilliseconds = 3; // last heartbeat's time (since epoch). This is the only heartbeat value that changes during online indexing.
 }

// The message that gets saved into the pending writes queue.
// This message gets stored in an google.protobuf.Any field in the queue. This means that this message type SHOULD NOT be moved
// or renamed to preserve wire-format compatibility with existing data.
message PendingWritesQueueEntry {
  // The kind of deferred index operation carried by this entry. New operations (e.g. DELETE_WHERE) may be added over
  // time; a drainer that does not recognize an operation should fail rather than silently skip it.
  enum Operation {
    UPDATE = 1; // apply an old/new record change; `data` holds a serialized OldAndNewRecords
  }
  required Operation operation = 1;
  optional google.protobuf.Any data = 2;
}

// The `data` payload for a PendingWritesQueueEntry UPDATE operation. This represents a record change that needs to be
// indexed: Either of the records (but not both) can be null, where null "old_records" means we are inserting a new
// record and null "new_record" means we are deleting an existing one.
message OldAndNewRecords {
  // Simple cases where store serializer can handle the records (typically this is not the case for synthetic records)
  optional bytes old_records = 1;
  optional bytes new_record = 2;
}

message SlidingWindowQueueEntry {
  // serialize sliding window entry - old and new records are for the sliding window, the
  // dedicated Any messages are needed for the delegated index.
  optional bytes old_records = 1;
  optional bytes new_record = 2;
  optional google.protobuf.Any delegated_delete = 3;
  optional google.protobuf.Any delegated_insert = 4;
}
