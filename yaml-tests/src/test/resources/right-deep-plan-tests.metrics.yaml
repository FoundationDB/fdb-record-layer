    explain: EXPLODE arrayDistinct(promote(@c30 AS ARRAY(LONG))) | FLATMAP q0 -> {
        SCAN(<,>) | TFILTER T2 | FILTER _.ID EQUALS q0 | FLATMAP q1 -> { SCAN(<,>)
        | TFILTER T1 | FLATMAP q2 -> { EXPLODE q2.T2_REFS | FILTER _ EQUALS q1.ID
        AS q3 RETURN q2 } AS q2 RETURN (q2 AS _0, q1 AS _1) } AS q5 RETURN (q5._0.NAME
        AS _0, q5._1.NAME AS _1) }
