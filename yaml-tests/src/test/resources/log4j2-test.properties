appenders = console
loggers = yamlTestsLogger, embeddedConnLogger, recordStoreLogger, catalogInitLogger, instrumentedTxnLogger

appender.console.type = Console
appender.console.name = console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %.-5level\t%date{DEFAULT}\t%logger{1}\t%msg%n

rootLogger.level = OFF

logger.yamlTestsLogger.name=com.apple.foundationdb.relational.yamltests
logger.yamlTestsLogger.level = INFO
logger.yamlTestsLogger.appenderRefs = stdout
logger.yamlTestsLogger.appenderRef.stdout.ref = console

# Diagnostic: surface commit-conflict enrichment from EmbeddedRelationalConnection
logger.embeddedConnLogger.name=com.apple.foundationdb.relational.recordlayer.EmbeddedRelationalConnection
logger.embeddedConnLogger.level = WARN
logger.embeddedConnLogger.appenderRefs = stdout
logger.embeddedConnLogger.appenderRef.stdout.ref = console

# Diagnostic: surface checkVersion "dirty header" reasons from FDBRecordStore
logger.recordStoreLogger.name=com.apple.foundationdb.record.provider.foundationdb.FDBRecordStore
logger.recordStoreLogger.level = INFO
logger.recordStoreLogger.appenderRefs = stdout
logger.recordStoreLogger.appenderRef.stdout.ref = console

logger.catalogInitLogger.name=com.apple.foundationdb.relational.yamltests.YamlTestCatalogInitializer
logger.catalogInitLogger.level = WARN
logger.catalogInitLogger.appenderRefs = stdout
logger.catalogInitLogger.appenderRef.stdout.ref = console

# Diagnostic: TRACE emits every clear()/addWriteConflictRange() with the affected key range and
# a captured stack trace. Extremely noisy — leave off unless you're hunting a range-conflict.
logger.instrumentedTxnLogger.name=com.apple.foundationdb.record.provider.foundationdb.InstrumentedTransaction
logger.instrumentedTxnLogger.level = TRACE
logger.instrumentedTxnLogger.appenderRefs = stdout
logger.instrumentedTxnLogger.appenderRef.stdout.ref = console
